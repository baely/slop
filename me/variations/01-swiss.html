<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Bailey Butler — 01 / Swiss</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;700;900&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    font-family: 'Archivo', system-ui, sans-serif;
    background: #f1f0ec;
    color: #111;
    -webkit-font-smoothing: antialiased;
    font-feature-settings: 'ss01' on, 'cv11' on;
    padding: 48px;
    display: grid;
    grid-template-rows: auto 1fr auto;
    min-height: 100vh;
  }
  header, footer {
    display: grid;
    grid-template-columns: repeat(12, 1fr);
    gap: 16px;
    font-size: 11px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    font-weight: 500;
  }
  header span:nth-child(1) { grid-column: 1 / 4; }
  header span:nth-child(2) { grid-column: 5 / 9; }
  header span:nth-child(3) { grid-column: 10 / 13; text-align: right; }
  footer span:nth-child(1) { grid-column: 1 / 5; }
  footer span:nth-child(2) { grid-column: 9 / 13; text-align: right; }
  main {
    display: grid;
    grid-template-columns: repeat(12, 1fr);
    align-items: end;
    padding: 64px 0;
  }
  h1 {
    grid-column: 1 / 9;
    font-size: clamp(72px, 14vw, 220px);
    font-weight: 900;
    line-height: 0.82;
    letter-spacing: -0.05em;
  }
  h1 em {
    font-style: normal;
    font-weight: 400;
    display: block;
  }
  nav {
    grid-column: 10 / 13;
    display: grid;
    gap: 14px;
    padding-bottom: 12px;
  }
  nav a {
    display: grid;
    grid-template-columns: 1.4em 1fr auto;
    align-items: baseline;
    color: #111;
    text-decoration: none;
    border-top: 1px solid #111;
    padding: 12px 0 4px;
    font-size: 14px;
    font-weight: 500;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    transition: padding-left .25s ease, color .25s ease;
  }
  nav a span:first-child { font-size: 10px; opacity: .6; align-self: start; padding-top: 4px; }
  nav a span:last-child { font-size: 11px; opacity: 0; transition: opacity .25s ease; }
  nav a:hover { padding-left: 12px; color: #d2492a; }
  nav a:hover span:last-child { opacity: 1; }
  nav a:last-child { border-bottom: 1px solid #111; padding-bottom: 12px; }
  .accent { color: #d2492a; }
</style>
</head>
<body>
  <header>
    <span>Bailey Butler</span>
    <span>Personal Index <span class="accent">●</span> 01 of 12</span>
    <span>MMXXVI</span>
  </header>
  <main>
    <h1>Bailey<em>Butler.</em></h1>
    <nav>
      <a href="#"><span>01</span><span>GitHub</span><span>↗</span></a>
      <a href="#"><span>02</span><span>LinkedIn</span><span>↗</span></a>
      <a href="#"><span>03</span><span>Instagram</span><span>↗</span></a>
      <a href="#"><span>04</span><span>Letterboxd</span><span>↗</span></a>
      <a href="#"><span>05</span><span>Blog</span><span>↗</span></a>
    </nav>
  </main>
  <footer>
    <span>Set in Archivo. Printed on screen.</span>
    <span><a href="../" style="color:inherit;text-decoration:none;">← Index</a></span>
  </footer>
</body>
</html>
