<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Bailey Butler</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:opsz,wght@8..60,400;8..60,500&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Source Serif 4', Georgia, serif;
    background: #fafaf7;
    color: #1a1916;
    min-height: 100vh;
    padding: 80px 32px;
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    -webkit-font-smoothing: antialiased;
  }
  main {
    max-width: 520px;
    margin: 0 auto;
    width: 100%;
  }
  h1 {
    font-weight: 500;
    font-size: clamp(40px, 6vw, 60px);
    line-height: 1.05;
    letter-spacing: -0.015em;
    margin-bottom: 36px;
  }
  ul {
    list-style: none;
    display: grid;
    gap: 10px;
    font-size: clamp(20px, 2.4vw, 24px);
    font-weight: 400;
  }
  ul a {
    color: #1a1916;
    text-decoration: none;
    border-bottom: 1px solid rgba(26,25,22,0.25);
    padding-bottom: 1px;
    transition: border-color .2s ease;
  }
  ul a:hover { border-bottom-color: #1a1916; }
</style>
</head>
<body>
  <main>
    <h1>Bailey Butler</h1>
    <ul>
      <li><a href="#">GitHub</a></li>
      <li><a href="#">LinkedIn</a></li>
      <li><a href="#">Instagram</a></li>
      <li><a href="#">Letterboxd</a></li>
      <li><a href="#">Blog</a></li>
    </ul>
  </main>
</body>
</html>
