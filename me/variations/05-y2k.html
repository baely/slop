<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Bailey Butler — 05 / Y2K</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Major+Mono+Display&family=Orbitron:wght@500;700;900&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; overflow: hidden; }
  body {
    font-family: 'Orbitron', sans-serif;
    color: #fff;
    background:
      radial-gradient(circle at 20% 20%, #ff8be1 0%, transparent 40%),
      radial-gradient(circle at 80% 30%, #8be1ff 0%, transparent 45%),
      radial-gradient(circle at 50% 90%, #b58bff 0%, transparent 50%),
      linear-gradient(135deg, #1a1230, #0b0820);
    min-height: 100vh;
    display: grid;
    place-items: center;
    padding: 32px;
    position: relative;
  }
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='200' height='200'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2' stitchTiles='stitch'/></filter><rect width='200' height='200' filter='url(%23n)' opacity='0.35'/></svg>");
    opacity: .25;
    pointer-events: none;
    mix-blend-mode: overlay;
  }
  .card {
    width: min(620px, 95vw);
    padding: 6px;
    border-radius: 28px;
    background:
      conic-gradient(from 180deg at 50% 50%, #ff9ee2, #9eb8ff, #9effe2, #ffe19e, #ff9ee2);
    box-shadow: 0 30px 80px rgba(80, 0, 100, .4), 0 0 0 1px rgba(255,255,255,.2) inset;
    position: relative;
    animation: spin 18s linear infinite;
  }
  @keyframes spin { to { filter: hue-rotate(360deg); } }
  .inner {
    border-radius: 22px;
    padding: 36px 32px;
    background:
      linear-gradient(180deg, rgba(255,255,255,.18), rgba(255,255,255,.04) 40%, rgba(0,0,0,.25)),
      rgba(20, 12, 40, 0.5);
    backdrop-filter: blur(14px) saturate(140%);
    -webkit-backdrop-filter: blur(14px) saturate(140%);
    border: 1px solid rgba(255,255,255,.3);
    text-align: center;
  }
  .pin {
    font-family: 'Major Mono Display', monospace;
    font-size: 11px;
    letter-spacing: 0.3em;
    opacity: .8;
  }
  h1 {
    font-family: 'Major Mono Display', monospace;
    font-size: clamp(40px, 8vw, 78px);
    margin: 12px 0 4px;
    letter-spacing: 0.04em;
    background: linear-gradient(180deg, #ffffff 30%, #c5b1ff 50%, #ff9ee2 70%);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    text-shadow: 0 0 30px rgba(255,180,255,.5);
  }
  .sub { font-size: 11px; letter-spacing: 0.4em; opacity: .8; margin-bottom: 28px; }
  ul { list-style: none; display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
  ul li:last-child { grid-column: 1 / -1; }
  ul a {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 18px;
    border-radius: 999px;
    text-decoration: none;
    color: #fff;
    font-family: 'Orbitron', sans-serif;
    font-weight: 700;
    font-size: 13px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    background:
      linear-gradient(180deg, rgba(255,255,255,.4), rgba(255,255,255,.05) 40%, rgba(0,0,0,.2)),
      linear-gradient(135deg, rgba(255,158,226,.5), rgba(158,184,255,.4));
    border: 1px solid rgba(255,255,255,.35);
    box-shadow:
      inset 0 1px 0 rgba(255,255,255,.6),
      inset 0 -2px 8px rgba(0,0,0,.2),
      0 6px 18px rgba(120, 50, 180, .3);
    transition: transform .2s ease, box-shadow .2s ease;
  }
  ul a::after { content: '◗'; opacity: .7; }
  ul a:hover { transform: translateY(-2px) scale(1.02); box-shadow: inset 0 1px 0 rgba(255,255,255,.7), 0 12px 28px rgba(180,80,220,.45); }
  .back { display: block; margin-top: 22px; font-size: 10px; letter-spacing: 0.4em; color: rgba(255,255,255,.7); text-decoration: none; }
  .back:hover { color: #fff; }
</style>
</head>
<body>
  <div class="card">
    <div class="inner">
      <div class="pin">◆ user.profile.v2k ◆</div>
      <h1>BAILEY BUTLER</h1>
      <div class="sub">— online · always rendering —</div>
      <ul>
        <li><a href="#"><span>GITHUB</span></a></li>
        <li><a href="#"><span>LINKEDIN</span></a></li>
        <li><a href="#"><span>INSTAGRAM</span></a></li>
        <li><a href="#"><span>LETTERBOXD</span></a></li>
        <li><a href="#"><span>THE BLOG</span></a></li>
      </ul>
      <a href="../" class="back">‹ back to disc menu</a>
    </div>
  </div>
</body>
</html>
