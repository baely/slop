<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Bailey Butler</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:opsz,wght@8..60,400;8..60,500;8..60,600&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Source Serif 4', Georgia, serif;
    background: #fafaf7;
    color: #1a1916;
    min-height: 100vh;
    padding: 80px 64px;
    display: flex;
    flex-direction: column;
    gap: 48px;
    -webkit-font-smoothing: antialiased;
  }
  h1 {
    font-weight: 500;
    font-size: clamp(72px, 13vw, 180px);
    line-height: 0.92;
    letter-spacing: -0.025em;
  }
  ul {
    list-style: none;
    display: flex;
    flex-wrap: wrap;
    gap: 0 28px;
    font-size: clamp(20px, 2.2vw, 24px);
    line-height: 1.4;
  }
  ul a {
    color: #1a1916;
    text-decoration: none;
    border-bottom: 1px solid rgba(26,25,22,0.3);
    padding-bottom: 1px;
    transition: border-color .2s ease;
  }
  ul a:hover { border-bottom-color: #1a1916; }
  @media (max-width: 720px) {
    body { padding: 48px 28px; gap: 32px; }
    ul { gap: 8px 22px; }
  }
</style>
</head>
<body>
  <h1>Bailey<br>Butler</h1>
  <ul>
    <li><a href="#">GitHub</a></li>
    <li><a href="#">LinkedIn</a></li>
    <li><a href="#">Instagram</a></li>
    <li><a href="#">Letterboxd</a></li>
    <li><a href="#">Blog</a></li>
  </ul>
</body>
</html>
