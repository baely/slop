<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Statement Parser</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.0.379/pdf.min.mjs" type="module"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: system-ui, -apple-system, sans-serif;
  background: #fff;
  min-height: 100vh;
  padding: 24px 16px;
  color: #111;
  font-size: 13px;
  line-height: 1.5;
}

.container { max-width: 900px; margin: 0 auto; }

/* Header */
header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 32px;
  padding-bottom: 24px;
  border-bottom: 1px solid #e0e0e0;
}

.header-left {
  display: flex;
  align-items: center;
  gap: 14px;
}

.logo {
  width: 36px;
  height: 36px;
  background: #111;
  color: #fff;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 700;
  font-size: 14px;
}

header h1 { font-size: 18px; font-weight: 600; }
.subtitle { color: #999; font-size: 12px; }

.header-right {
  display: flex;
  align-items: center;
  gap: 8px;
}

.header-count {
  color: #999;
  font-size: 11px;
  font-family: 'Courier New', monospace;
}

/* Buttons */
.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  padding: 8px 16px;
  border: 1px solid #ddd;
  background: #fff;
  font-size: 12px;
  font-weight: 600;
  font-family: inherit;
  cursor: pointer;
  white-space: nowrap;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  color: #555;
}
.btn:hover:not(:disabled) { border-color: #999; color: #111; }
.btn:disabled { opacity: 0.3; cursor: not-allowed; }

.btn-primary {
  background: #111;
  color: #fff;
  border-color: #111;
}
.btn-primary:hover:not(:disabled) { background: #333; border-color: #333; color: #fff; }

.btn-small { padding: 4px 10px; font-size: 11px; }

/* Cards */
.card {
  background: #fff;
  border: 1px solid #ddd;
  padding: 20px;
  margin-bottom: 16px;
}

.card h2 {
  font-size: 10px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: #999;
  margin-bottom: 14px;
}

/* Drop zone */
.drop-zone {
  border: 1px dashed #ddd;
  padding: 40px 20px;
  text-align: center;
  cursor: pointer;
  background: #fafafa;
  transition: all 0.15s;
}
.drop-zone:hover, .drop-zone.dragover {
  border-color: #111;
  background: #f5f5f5;
}
.drop-zone-content {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
}
.drop-icon { width: 32px; height: 32px; color: #bbb; }
.drop-zone p { color: #555; font-size: 13px; }
.drop-hint { color: #bbb; font-size: 11px; }
#file-input { display: none; }

/* Progress */
.progress-bar {
  width: 100%;
  height: 4px;
  background: #e0e0e0;
  overflow: hidden;
  margin-top: 14px;
  display: none;
}
.progress-bar.active { display: block; }
.progress-fill {
  height: 100%;
  background: #111;
  width: 0%;
  transition: width 0.3s;
  animation: progress-pulse 1.5s ease-in-out infinite;
}
@keyframes progress-pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.4; }
}

/* File list */
.file-list {
  display: flex;
  flex-direction: column;
  gap: 4px;
  margin-top: 14px;
}

.file-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 8px 0;
  border-bottom: 1px solid #f0f0f0;
  animation: fadeIn 0.2s ease both;
}
.file-item .icon { width: 16px; height: 16px; color: #bbb; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.file-item .icon.done { color: #111; }
.file-item .icon.error { color: #c00; }
.file-item .name { flex: 1; font-size: 12px; color: #555; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.file-item .txn-count { font-family: 'Courier New', monospace; font-size: 11px; color: #999; }
.file-item .status { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; color: #bbb; width: 48px; text-align: right; }
.file-item .status.done { color: #111; }
.file-item .status.error { color: #c00; }

/* Stats */
.stats-grid {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 10px;
  margin-bottom: 16px;
}
.stat-item {
  background: #fafafa;
  border: 1px solid #e0e0e0;
  padding: 14px;
  text-align: center;
}
.stat-value {
  display: block;
  font-size: 1.2rem;
  font-weight: 700;
  letter-spacing: -0.02em;
}
.stat-value.green { color: #1a8a5c; }
.stat-value.red { color: #c00; }
.stat-label {
  display: block;
  font-size: 10px;
  color: #999;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  margin-top: 2px;
}

/* Table */
.table-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 12px;
}

.filter-input {
  padding: 6px 9px;
  border: 1px solid #ddd;
  font-size: 12px;
  font-family: inherit;
  background: #fff;
  color: #111;
  outline: none;
  width: 220px;
}
.filter-input:focus { border-color: #111; }
.filter-input::placeholder { color: #bbb; }

.table-scroll {
  overflow-x: auto;
  max-height: 560px;
  overflow-y: auto;
}
.table-scroll::-webkit-scrollbar { width: 4px; }
.table-scroll::-webkit-scrollbar-track { background: transparent; }
.table-scroll::-webkit-scrollbar-thumb { background: #ddd; }

table { width: 100%; border-collapse: collapse; }

thead th {
  font-size: 10px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: #999;
  padding: 8px 10px;
  text-align: left;
  border-bottom: 1px solid #ddd;
  position: sticky;
  top: 0;
  background: #fff;
  cursor: pointer;
  user-select: none;
  white-space: nowrap;
}
thead th:hover { color: #555; }

th.amount-col, td.amount-col { text-align: right; }

tbody tr { transition: background 0.1s; }
tbody tr:hover { background: #fafafa; }

td {
  padding: 7px 10px;
  border-bottom: 1px solid #f0f0f0;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  max-width: 380px;
  font-size: 12px;
}

td.date-col {
  font-family: 'Courier New', monospace;
  font-size: 11px;
  color: #999;
}

td.desc-col { color: #111; }

td.amount-col {
  font-family: 'Courier New', monospace;
  font-size: 12px;
}
td.amount-col.credit { color: #1a8a5c; }
td.amount-col.debit { color: #c00; }
td.amount-col.balance { color: #555; }

.empty-state {
  text-align: center;
  color: #bbb;
  font-size: 13px;
  padding: 24px 0;
}

th .sort-arrow {
  font-size: 8px;
  margin-left: 2px;
  opacity: 0.3;
}
th.sorted .sort-arrow { opacity: 1; color: #111; }

.hidden { display: none !important; }

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(-4px); }
  to { opacity: 1; transform: translateY(0); }
}
@keyframes spin { to { transform: rotate(360deg); } }
.spinner {
  width: 12px; height: 12px;
  border: 1.5px solid #ddd;
  border-top-color: #111;
  border-radius: 50%;
  animation: spin 0.6s linear infinite;
}

@media (max-width: 600px) {
  .stats-grid { grid-template-columns: repeat(2, 1fr); }
  .header-right .btn:not(.btn-primary) { display: none; }
}
</style>
</head>
<body>

<div class="container">
  <header>
    <div class="header-left">
      <div class="logo">SP</div>
      <div>
        <h1>Statement Parser</h1>
        <p class="subtitle">ANZ Statement PDF to CSV</p>
      </div>
    </div>
    <div class="header-right">
      <span class="header-count hidden" id="header-count"></span>
      <button class="btn btn-small hidden" id="btn-clear">Clear</button>
      <button class="btn btn-primary" id="btn-export" disabled>Export CSV</button>
    </div>
  </header>

  <div class="card">
    <h2>Upload</h2>
    <div class="drop-zone" id="drop-zone">
      <div class="drop-zone-content">
        <svg class="drop-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
          <polyline points="14 2 14 8 20 8"/>
          <line x1="12" y1="18" x2="12" y2="12"/>
          <line x1="9" y1="15" x2="12" y2="12"/>
          <line x1="15" y1="15" x2="12" y2="12"/>
        </svg>
        <p>Drop statement PDFs here</p>
        <span class="drop-hint">or click to browse</span>
      </div>
      <input type="file" id="file-input" multiple accept=".pdf">
    </div>
    <div class="progress-bar" id="progress-bar">
      <div class="progress-fill" id="progress-fill"></div>
    </div>
    <div id="file-list" class="file-list"></div>
  </div>

  <div id="stats-section" class="hidden">
    <div class="stats-grid">
      <div class="stat-item">
        <span class="stat-value" id="stat-files">0</span>
        <span class="stat-label">Statements</span>
      </div>
      <div class="stat-item">
        <span class="stat-value" id="stat-txns">0</span>
        <span class="stat-label">Transactions</span>
      </div>
      <div class="stat-item">
        <span class="stat-value green" id="stat-credits">$0.00</span>
        <span class="stat-label">Credits</span>
      </div>
      <div class="stat-item">
        <span class="stat-value red" id="stat-debits">$0.00</span>
        <span class="stat-label">Debits</span>
      </div>
      <div class="stat-item">
        <span class="stat-value" id="stat-range" style="font-size:0.85rem">—</span>
        <span class="stat-label">Date Range</span>
      </div>
    </div>
  </div>

  <div id="table-card" class="card hidden">
    <div class="table-header">
      <h2>Transactions</h2>
      <input type="text" class="filter-input" id="filter-input" placeholder="Filter by description...">
    </div>
    <div class="table-scroll">
      <table>
        <thead>
          <tr>
            <th data-sort="date" class="sorted">Date <span class="sort-arrow">&#9660;</span></th>
            <th data-sort="description">Description <span class="sort-arrow">&#9660;</span></th>
            <th data-sort="credit" class="amount-col">Credit <span class="sort-arrow">&#9660;</span></th>
            <th data-sort="debit" class="amount-col">Debit <span class="sort-arrow">&#9660;</span></th>
            <th data-sort="balance" class="amount-col">Balance <span class="sort-arrow">&#9660;</span></th>
            <th data-sort="effectiveDate">Eff. Date <span class="sort-arrow">&#9660;</span></th>
            <th data-sort="source">Source <span class="sort-arrow">&#9660;</span></th>
          </tr>
        </thead>
        <tbody id="table-body"></tbody>
      </table>
    </div>
  </div>

  <div id="empty-state" class="empty-state hidden">No transactions found.</div>
</div>

<script type="module">
import * as pdfjsLib from 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.0.379/pdf.min.mjs';

pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.0.379/pdf.worker.min.mjs';

const dropZone = document.getElementById('drop-zone');
const fileInput = document.getElementById('file-input');
const fileListEl = document.getElementById('file-list');
const statsSection = document.getElementById('stats-section');
const tableCard = document.getElementById('table-card');
const tableBody = document.getElementById('table-body');
const filterInput = document.getElementById('filter-input');
const progressBar = document.getElementById('progress-bar');
const progressFill = document.getElementById('progress-fill');
const emptyState = document.getElementById('empty-state');
const headerCount = document.getElementById('header-count');
const btnExport = document.getElementById('btn-export');
const btnClear = document.getElementById('btn-clear');

let allTransactions = [];
let sortField = 'date';
let sortDir = 'desc';

dropZone.addEventListener('click', () => fileInput.click());
dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('dragover'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
dropZone.addEventListener('drop', e => {
  e.preventDefault();
  dropZone.classList.remove('dragover');
  const files = Array.from(e.dataTransfer.files).filter(f => f.type === 'application/pdf');
  if (files.length) processFiles(files);
});
fileInput.addEventListener('change', () => {
  if (fileInput.files.length) processFiles(Array.from(fileInput.files));
});

document.querySelectorAll('thead th[data-sort]').forEach(th => {
  th.addEventListener('click', () => {
    const field = th.dataset.sort;
    if (sortField === field) {
      sortDir = sortDir === 'asc' ? 'desc' : 'asc';
    } else {
      sortField = field;
      sortDir = field === 'date' ? 'desc' : 'asc';
    }
    document.querySelectorAll('thead th').forEach(t => t.classList.remove('sorted'));
    th.classList.add('sorted');
    th.querySelector('.sort-arrow').textContent = sortDir === 'asc' ? '\u25B2' : '\u25BC';
    renderTable();
  });
});

filterInput.addEventListener('input', () => renderTable());
btnExport.addEventListener('click', exportCSV);
btnClear.addEventListener('click', () => {
  allTransactions = [];
  fileListEl.innerHTML = '';
  statsSection.classList.add('hidden');
  tableCard.classList.add('hidden');
  emptyState.classList.add('hidden');
  headerCount.classList.add('hidden');
  btnClear.classList.add('hidden');
  btnExport.disabled = true;
  updateStats();
});

async function processFiles(files) {
  progressBar.classList.add('active');
  progressFill.style.width = '0%';

  for (let i = 0; i < files.length; i++) {
    const file = files[i];
    const itemEl = addFileItem(file.name);

    try {
      const buffer = await file.arrayBuffer();
      const txns = await parsePDF(buffer, file.name);
      allTransactions.push(...txns);
      updateFileItem(itemEl, 'done', `${txns.length} txns`);
    } catch (err) {
      console.error('Parse error:', err);
      updateFileItem(itemEl, 'error', 'Failed');
    }

    progressFill.style.width = `${((i + 1) / files.length) * 100}%`;
  }

  setTimeout(() => progressBar.classList.remove('active'), 500);
  updateStats();
  renderTable();
}

function addFileItem(name) {
  const el = document.createElement('div');
  el.className = 'file-item';
  el.innerHTML = `
    <div class="icon"><div class="spinner"></div></div>
    <div class="name">${escapeHtml(name)}</div>
    <div class="txn-count"></div>
    <div class="status">...</div>
  `;
  fileListEl.appendChild(el);
  return el;
}

function updateFileItem(el, status, text) {
  const iconEl = el.querySelector('.icon');
  const statusEl = el.querySelector('.status');
  const countEl = el.querySelector('.txn-count');

  if (status === 'done') {
    iconEl.innerHTML = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="20 6 9 17 4 12"/></svg>`;
    iconEl.className = 'icon done';
    statusEl.textContent = 'done';
    statusEl.className = 'status done';
    countEl.textContent = text;
  } else {
    iconEl.innerHTML = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>`;
    iconEl.className = 'icon error';
    statusEl.textContent = text;
    statusEl.className = 'status error';
  }
}

function updateStats() {
  const txns = allTransactions;
  const totalCredits = txns.reduce((s, t) => s + (t.credit || 0), 0);
  const totalDebits = txns.reduce((s, t) => s + (t.debit || 0), 0);

  document.getElementById('stat-files').textContent = new Set(txns.map(t => t.source)).size;
  document.getElementById('stat-txns').textContent = txns.length.toLocaleString();
  document.getElementById('stat-credits').textContent = formatMoney(totalCredits);
  document.getElementById('stat-debits').textContent = formatMoney(totalDebits);

  if (txns.length) {
    const dates = txns.map(t => t.dateObj).filter(Boolean).sort((a, b) => a - b);
    if (dates.length >= 2) {
      const fmt = d => d.toLocaleDateString('en-AU', { month: 'short', year: '2-digit' });
      document.getElementById('stat-range').textContent = `${fmt(dates[0])} — ${fmt(dates[dates.length - 1])}`;
    }
    headerCount.textContent = `${txns.length.toLocaleString()} transactions`;
    headerCount.classList.remove('hidden');
    btnClear.classList.remove('hidden');
    btnExport.disabled = false;
    statsSection.classList.remove('hidden');
  }
}

function formatMoney(v) {
  return '$' + Math.abs(v).toLocaleString('en-AU', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}

function renderTable() {
  const filter = filterInput.value.toLowerCase();
  let txns = allTransactions;

  if (filter) {
    txns = txns.filter(t => t.description.toLowerCase().includes(filter));
  }

  txns = [...txns].sort((a, b) => {
    let av, bv;
    switch (sortField) {
      case 'date': av = a.dateObj || new Date(0); bv = b.dateObj || new Date(0); break;
      case 'description': av = a.description; bv = b.description; break;
      case 'credit': av = a.credit || 0; bv = b.credit || 0; break;
      case 'debit': av = a.debit || 0; bv = b.debit || 0; break;
      case 'balance': av = a.balance || 0; bv = b.balance || 0; break;
      case 'effectiveDate': av = a.effectiveDateObj || new Date(0); bv = b.effectiveDateObj || new Date(0); break;
      case 'source': av = a.source; bv = b.source; break;
      default: av = 0; bv = 0;
    }
    if (av < bv) return sortDir === 'asc' ? -1 : 1;
    if (av > bv) return sortDir === 'asc' ? 1 : -1;
    return 0;
  });

  if (txns.length === 0 && allTransactions.length > 0) {
    tableCard.classList.add('hidden');
    emptyState.classList.remove('hidden');
  } else if (txns.length > 0) {
    emptyState.classList.add('hidden');
    tableCard.classList.remove('hidden');
  }

  tableBody.innerHTML = txns.map(t => `
    <tr>
      <td class="date-col">${escapeHtml(t.date)}</td>
      <td class="desc-col" title="${escapeHtml(t.description)}">${escapeHtml(t.description)}</td>
      <td class="amount-col credit">${t.credit ? formatMoney(t.credit) : ''}</td>
      <td class="amount-col debit">${t.debit ? formatMoney(t.debit) : ''}</td>
      <td class="amount-col balance">${t.balance != null ? formatMoney(t.balance) : ''}</td>
      <td class="date-col">${escapeHtml(t.effectiveDate || '')}</td>
      <td class="date-col">${escapeHtml(t.source || '')}</td>
    </tr>
  `).join('');
}

function exportCSV() {
  const headers = ['Date', 'Description', 'Credit', 'Debit', 'Balance', 'Effective Date', 'Statement Period', 'BSB', 'Account Number', 'Account Name', 'Source File'];
  const rows = allTransactions.map(t => [
    t.date,
    t.description,
    t.credit || '',
    t.debit || '',
    t.balance != null ? t.balance : '',
    t.effectiveDate || '',
    t.statementPeriod || '',
    t.bsb || '',
    t.accountNumber || '',
    t.accountName || '',
    t.source || ''
  ]);

  const csv = [headers, ...rows].map(r =>
    r.map(v => `"${String(v).replace(/"/g, '""')}"`).join(',')
  ).join('\n');

  const blob = new Blob([csv], { type: 'text/csv' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `transactions_${new Date().toISOString().slice(0, 10)}.csv`;
  a.click();
  URL.revokeObjectURL(url);
}

// ─── PDF Parser ───
const MONTHS = { jan: 0, feb: 1, mar: 2, apr: 3, may: 4, jun: 5, jul: 6, aug: 7, sep: 8, oct: 9, nov: 10, dec: 11,
  january: 0, february: 1, march: 2, april: 3, june: 5, july: 6, august: 7, september: 8, october: 9, november: 10, december: 11 };

const DATE_RE = /^(\d{1,2})\s+(Jan|Feb|Mar|Apr|May|Jun|Jul|Aug|Sep|Oct|Nov|Dec)$/i;
const MONEY_RE = /^\$[\d,]+\.\d{2}$/;
// Bare number like 2,000.00 or 0.00 (no $ prefix, used in Access Advantage)
const BARE_MONEY_RE = /^[\d,]+\.\d{2}$/;

async function parsePDF(buffer, fileName) {
  const pdf = await pdfjsLib.getDocument({ data: buffer }).promise;

  const allLines = [];
  for (let p = 1; p <= pdf.numPages; p++) {
    const page = await pdf.getPage(p);
    const content = await page.getTextContent();
    const items = content.items.filter(item => item.str.trim());
    if (!items.length) continue;

    items.sort((a, b) => {
      const dy = b.transform[5] - a.transform[5];
      if (Math.abs(dy) > 3) return dy;
      return 0;
    });

    let currentY = null;
    let currentLine = null;
    for (const item of items) {
      const y = item.transform[5];
      if (currentY === null || Math.abs(currentY - y) > 3) {
        currentLine = [];
        allLines.push(currentLine);
        currentY = y;
      }
      currentLine.push(item.str.trim());
    }
  }

  // Detect statement type
  const allText = allLines.slice(0, 20).map(l => l.join(' ')).join('\n');
  const isAccessAdvantage = allText.includes('ACCESS ADVANTAGE');

  if (isAccessAdvantage) {
    return parseAccessAdvantage(allLines, fileName);
  } else {
    return parseANZPlus(allLines, fileName);
  }
}

// ─── ANZ Access Advantage Parser ───
function parseAccessAdvantage(allLines, fileName) {
  const metadata = { period: '', bsb: '', accountNumber: '', accountName: '' };

  // Extract metadata
  for (const line of allLines) {
    const text = line.join(' ');

    // Period: "03 SEPTEMBER 2021 TO 03 NOVEMBER 2021"
    const periodMatch = text.match(/(\d{1,2}\s+\w+\s+\d{4})\s+TO\s+(\d{1,2}\s+\w+\s+\d{4})/i);
    if (periodMatch && !metadata.period) metadata.period = `${periodMatch[1]} - ${periodMatch[2]}`;

    // BSB: "013-723"
    const bsbMatch = text.match(/\b(\d{3}-\d{3})\b/);
    if (bsbMatch && !metadata.bsb) metadata.bsb = bsbMatch[1].replace(/-/g, '');

    // Account number: "6431-95366" or "Account Number 6431-95366"
    const accMatch = text.match(/(\d{4}-\d{5})/);
    if (accMatch && !metadata.accountNumber) metadata.accountNumber = accMatch[1].replace(/-/g, '');

    // Account name
    if (text.match(/^BUTLER\s/i) && !metadata.accountName) metadata.accountName = text;
  }

  const transactions = [];
  let inTransactions = false;
  let currentYear = null;

  for (let i = 0; i < allLines.length; i++) {
    const line = allLines[i];
    const text = line.join(' ');

    // Detect transaction header
    if (text.includes('Transaction Details') && line.includes('Withdrawals ($)') && line.includes('Deposits ($)')) {
      inTransactions = true;
      continue;
    }

    if (!inTransactions) continue;

    // Year line: "2021 | blank | blank"
    const yearMatch = line[0] && line[0].match(/^(20\d{2})$/);
    if (yearMatch) {
      currentYear = parseInt(yearMatch[1]);
      continue;
    }

    // Stop conditions
    if (text.includes('TOTALS AT END OF') || text.includes('Fee Summary') ||
        text.includes('Australia and New Zealand') ||
        (text.includes('Page') && text.includes('of'))) {
      if (text.includes('TOTALS AT END OF PERIOD') || text.includes('Fee Summary')) {
        inTransactions = false;
      }
      continue;
    }

    // Skip structural lines
    if (text.includes('ANZ ACCESS ADVANTAGE') || text.includes('Account Number') ||
        text.includes('Transaction Details') || text.includes('Please retain')) {
      continue;
    }

    // Transaction line: "DD MON | DESCRIPTION | withdrawal_or_blank | deposit_or_blank | balance"
    const accessDateMatch = line[0] && line[0].match(/^(\d{2})\s+(JAN|FEB|MAR|APR|MAY|JUN|JUL|AUG|SEP|OCT|NOV|DEC)$/i);
    if (!accessDateMatch || !currentYear) continue;

    const day = parseInt(accessDateMatch[1]);
    const month = MONTHS[accessDateMatch[2].toLowerCase()];
    const year = currentYear;
    const dateObj = new Date(year, month, day);
    const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;

    // Parse remaining tokens: description, then withdrawal/deposit/balance values
    const rest = line.slice(1).filter(t => t !== 'blank');
    const descParts = [];
    const moneyValues = [];

    for (const token of rest) {
      if (BARE_MONEY_RE.test(token)) {
        moneyValues.push(parseFloat(token.replace(/,/g, '')));
      } else if (MONEY_RE.test(token)) {
        moneyValues.push(parseFloat(token.replace(/[$,]/g, '')));
      } else {
        if (moneyValues.length === 0) {
          descParts.push(token);
        }
      }
    }

    let description = descParts.join(' ');

    // Skip OPENING BALANCE line
    if (description.includes('OPENING BALANCE')) continue;

    // Lookahead for continuation lines and effective dates
    let effectiveDate = '';
    for (let j = i + 1; j < allLines.length; j++) {
      const nextLine = allLines[j];
      const nextText = nextLine.join(' ');

      // Stop at next transaction or structural element
      if (nextLine[0] && /^\d{2}\s+(JAN|FEB|MAR|APR|MAY|JUN|JUL|AUG|SEP|OCT|NOV|DEC)$/i.test(nextLine[0])) break;
      if (nextLine[0] && /^20\d{2}$/.test(nextLine[0])) break;
      if (nextText.includes('TOTALS') || nextText.includes('Fee Summary') ||
          nextText.includes('Australia and New Zealand') ||
          (nextText.includes('Page') && nextText.includes('of')) ||
          nextText.includes('ANZ ACCESS ADVANTAGE') || nextText.includes('Account Number') ||
          nextText.includes('Transaction Details') ||
          (nextLine.includes('Withdrawals ($)') && nextLine.includes('Deposits ($)'))) break;

      // Effective date: "EFFECTIVE DATE 20 NOV 2021"
      const effMatch = nextText.match(/EFFECTIVE DATE\s+(\d{1,2})\s+(\w{3})\s+(\d{4})/i);
      if (effMatch) {
        const ed = effMatch[1].padStart(2, '0');
        const em = String(MONTHS[effMatch[2].toLowerCase()] + 1).padStart(2, '0');
        effectiveDate = `${ed}/${em}/${effMatch[3]}`;
        continue;
      }

      // Continuation description
      const contTokens = nextLine.filter(t => t !== 'blank' && !BARE_MONEY_RE.test(t) && !MONEY_RE.test(t));
      if (contTokens.length > 0) {
        description += ' ' + contTokens.join(' ');
      }
    }

    // Determine credit/debit from column position
    // Access Advantage columns: Withdrawals | Deposits | Balance
    // With blank filtering, we get 1-3 money values
    let credit = null, debit = null, balance = null;

    if (moneyValues.length === 3) {
      debit = moneyValues[0];
      credit = moneyValues[1];
      balance = moneyValues[2];
    } else if (moneyValues.length === 2) {
      balance = moneyValues[1];
      const amount = moneyValues[0];
      // Use description heuristic
      const descUpper = description.toUpperCase();
      const isDeposit = descUpper.includes('PAY/SALARY') || descUpper.includes('PAYMENT FROM') ||
        descUpper.includes('FUNDS TFER') && descUpper.includes('FROM') ||
        descUpper.includes('TRANSFER') && descUpper.includes('FROM');
      if (isDeposit) {
        credit = amount;
      } else {
        debit = amount;
      }
    } else if (moneyValues.length === 1) {
      // Only withdrawal or deposit, no balance shown
      const amount = moneyValues[0];
      const descUpper = description.toUpperCase();
      const isDeposit = descUpper.includes('PAY/SALARY') || descUpper.includes('PAYMENT FROM') ||
        descUpper.includes('FUNDS TFER') && descUpper.includes('FROM') ||
        descUpper.includes('TRANSFER') && descUpper.includes('FROM');
      if (isDeposit) {
        credit = amount;
      } else {
        debit = amount;
      }
    }

    let effectiveDateObj = null;
    if (effectiveDate) {
      const [ed, em, ey] = effectiveDate.split('/');
      effectiveDateObj = new Date(parseInt(ey), parseInt(em) - 1, parseInt(ed));
    }

    transactions.push({
      date: dateStr,
      dateObj,
      description: description.trim(),
      credit,
      debit,
      balance,
      effectiveDate,
      effectiveDateObj,
      statementPeriod: metadata.period,
      bsb: metadata.bsb,
      accountNumber: metadata.accountNumber,
      accountName: metadata.accountName || 'BUTLER BAILEY',
      source: fileName
    });
  }

  // Second pass: balance-based correction
  for (let i = 0; i < transactions.length - 1; i++) {
    const curr = transactions[i];
    const prev = transactions[i - 1]; // chronologically earlier (Access Advantage is chronological)
    if (i > 0 && curr.balance != null && prev.balance != null && (curr.credit || curr.debit)) {
      const amount = curr.credit || curr.debit;
      const diff = curr.balance - prev.balance;
      if (Math.abs(Math.abs(diff) - amount) < 0.01) {
        if (diff > 0) {
          curr.credit = amount;
          curr.debit = null;
        } else {
          curr.debit = amount;
          curr.credit = null;
        }
      }
    }
  }

  return transactions;
}

// ─── ANZ Plus Parser ───
function parseANZPlus(allLines, fileName) {
  const metadata = { period: '', bsb: '', accountNumber: '', accountName: '' };
  for (const line of allLines.slice(0, 30)) {
    const text = line.join(' ');
    const periodMatch = text.match(/(\d{1,2}\s+\w+\s+\d{4}\s*-\s*\d{1,2}\s+\w+\s+\d{4})/);
    if (periodMatch && !metadata.period) metadata.period = periodMatch[1];

    if (line.some(t => /^\d{3}\s\d{3}$/.test(t)) && line.some(t => /^\d{3}\s\d{3}\s\d{3}$/.test(t))) {
      for (const t of line) {
        if (/^\d{3}\s\d{3}$/.test(t) && !metadata.bsb) metadata.bsb = t.replace(/\s/g, '');
        if (/^\d{3}\s\d{3}\s\d{3}$/.test(t) && !metadata.accountNumber) metadata.accountNumber = t.replace(/\s/g, '');
      }
    }
  }
  if (!metadata.bsb) metadata.bsb = '014111';

  let statementStartDate = null;
  let statementEndDate = null;
  if (metadata.period) {
    const m = metadata.period.match(/(\d{1,2})\s+(\w+)\s+(\d{4})\s*-\s*(\d{1,2})\s+(\w+)\s+(\d{4})/);
    if (m) {
      statementStartDate = new Date(parseInt(m[3]), MONTHS[m[2].toLowerCase()], parseInt(m[1]));
      statementEndDate = new Date(parseInt(m[6]), MONTHS[m[5].toLowerCase()], parseInt(m[4]));
    }
  }

  const transactions = [];
  let inTransactions = false;

  // Old format date header: "Thu, 31st March 2022 | Credit | Debit | Balance"
  const OLD_DATE_RE = /^(Mon|Tue|Wed|Thu|Fri|Sat|Sun),\s+(\d{1,2})\w{2}\s+(\w+)\s+(\d{4})$/;
  let currentDate = null;

  for (let i = 0; i < allLines.length; i++) {
    const line = allLines[i];
    const text = line.join(' ');

    // New format header
    if (line.includes('Date') && line.includes('Description') && line.includes('Balance')) {
      inTransactions = true;
      continue;
    }

    // Old format date header
    const oldHeaderMatch = line[0] && line[0].match(OLD_DATE_RE);
    if (oldHeaderMatch && line.includes('Credit') && line.includes('Balance')) {
      const day = parseInt(oldHeaderMatch[2]);
      const month = MONTHS[oldHeaderMatch[3].toLowerCase()];
      const year = parseInt(oldHeaderMatch[4]);
      currentDate = { day, month, year };
      inTransactions = true;
      continue;
    }

    if (!inTransactions) continue;

    if (text.includes('Australia and New Zealand Banking') ||
        text.includes('Opening Balance') ||
        text.includes('Closing Balance') ||
        text.match(/^Page\s/) || text.includes('Page ') && text.includes(' of ') ||
        text.includes('Please check your statement') ||
        text.includes('Account Opened')) {
      inTransactions = false;
      continue;
    }

    if (text.includes('ANZ Plus') || text.includes('Account Statement')) {
      continue;
    }

    // Mid-page old date header
    const oldDateMatch = line[0] && line[0].match(OLD_DATE_RE);
    if (oldDateMatch && line.some(t => t === 'Credit' || t === 'Balance')) {
      const day = parseInt(oldDateMatch[2]);
      const month = MONTHS[oldDateMatch[3].toLowerCase()];
      const year = parseInt(oldDateMatch[4]);
      currentDate = { day, month, year };
      inTransactions = true;
      continue;
    }

    let day, month, year, rest;
    const dateCheck = line.slice(0, 1).join('');
    const dateMatch = dateCheck.match(DATE_RE);

    if (dateMatch) {
      day = parseInt(dateMatch[1]);
      const monthStr = dateMatch[2].toLowerCase();
      month = MONTHS[monthStr];
      year = statementEndDate ? statementEndDate.getFullYear() : new Date().getFullYear();
      if (statementStartDate && statementEndDate && statementStartDate.getFullYear() !== statementEndDate.getFullYear()) {
        if (month >= 10 && statementEndDate.getMonth() <= 2) {
          year = statementStartDate.getFullYear();
        }
      }
      rest = line.slice(1);
    } else if (currentDate) {
      day = currentDate.day;
      month = currentDate.month;
      year = currentDate.year;
      rest = line;
      if (!line.some(t => MONEY_RE.test(t))) continue;
    } else {
      continue;
    }

    const dateObj = new Date(year, month, day);
    const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;

    const descParts = [];
    const moneyValues = [];

    for (const token of rest) {
      if (MONEY_RE.test(token)) {
        moneyValues.push(parseFloat(token.replace(/[$,]/g, '')));
      } else {
        if (moneyValues.length === 0) descParts.push(token);
      }
    }

    let description = descParts.join(' ');

    let effectiveDate = '';
    for (let j = i + 1; j < allLines.length; j++) {
      const nextLine = allLines[j];
      const nextText = nextLine.join(' ');

      if (DATE_RE.test(nextLine[0])) break;
      if (nextLine[0] && OLD_DATE_RE.test(nextLine[0])) break;
      if (nextText.includes('Australia and New Zealand') ||
          nextText.includes('ANZ Plus') ||
          nextText.includes('Account Statement') ||
          nextText.includes('Opening Balance') ||
          nextText.includes('Closing Balance') ||
          nextText.includes('Account Opened') ||
          (nextText.includes('Page ') && nextText.includes(' of ')) ||
          (nextLine.includes('Date') && nextLine.includes('Description'))) break;

      if (nextLine.some(t => MONEY_RE.test(t))) {
        const effMatch = nextText.match(/Effective Date\s+(\d{2}\/\d{2}\/\d{4})/);
        if (effMatch) effectiveDate = effMatch[1];
        break;
      }

      const effMatch = nextText.match(/Effective Date\s+(\d{2}\/\d{2}\/\d{4})/);
      if (effMatch) { effectiveDate = effMatch[1]; continue; }

      const hasOnlyText = nextLine.every(t => !MONEY_RE.test(t));
      if (hasOnlyText && nextLine.length > 0) {
        description += ' ' + nextLine.join(' ');
      }
    }

    let credit = null, debit = null, balance = null;

    if (moneyValues.length >= 2) {
      balance = moneyValues[moneyValues.length - 1];
      const amount = moneyValues[moneyValues.length - 2];

      const descUpper = description.toUpperCase();
      const isCreditDesc = descUpper.includes('PAY/SALARY') || descUpper.includes('PAYMENT FROM') ||
        descUpper.includes('TRANSFER FROM') || descUpper.includes('INTEREST') ||
        descUpper.includes('CREDIT') || descUpper.includes('REFUND') ||
        descUpper.includes('CASHBACK');

      if (isCreditDesc) { credit = amount; } else { debit = amount; }

      if (moneyValues.length === 3) {
        credit = moneyValues[0]; debit = moneyValues[1]; balance = moneyValues[2];
      }
    } else if (moneyValues.length === 1) {
      balance = moneyValues[0];
    }

    let effectiveDateObj = null;
    if (effectiveDate) {
      const [ed, em, ey] = effectiveDate.split('/');
      effectiveDateObj = new Date(parseInt(ey), parseInt(em) - 1, parseInt(ed));
    }

    transactions.push({
      date: dateStr, dateObj,
      description: description.trim(),
      credit, debit, balance,
      effectiveDate, effectiveDateObj,
      statementPeriod: metadata.period,
      bsb: metadata.bsb,
      accountNumber: metadata.accountNumber,
      accountName: 'BAILEY DEAN BUTLER',
      source: fileName
    });
  }

  // Second pass: balance-based correction (reverse chronological)
  for (let i = 0; i < transactions.length - 1; i++) {
    const curr = transactions[i];
    const next = transactions[i + 1];
    if (curr.balance != null && next.balance != null && (curr.credit || curr.debit)) {
      const amount = curr.credit || curr.debit;
      const diff = curr.balance - next.balance;
      if (Math.abs(Math.abs(diff) - amount) < 0.01) {
        if (diff > 0) { curr.credit = amount; curr.debit = null; }
        else { curr.debit = amount; curr.credit = null; }
      }
    }
  }

  return transactions;
}

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}
