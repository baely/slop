services:
  covers:
    image: registry.baileys.dev/covers
    restart: unless-stopped
    env_file: .env
    volumes:
      - covers-data:/data
    networks:
      - web
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.covers.rule=Host(`covers.baileys.dev`)"
      - "traefik.http.services.covers.loadbalancer.server.port=8080"
      - "traefik.docker.network=web"

networks:
  web:
    external: true

volumes:
  covers-data:
