services:
  staticer:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: staticer-server
    restart: always
    ports:
      - "8080:8080"
    environment:
      # Server configuration
      - SERVER_PORT=8080
      - SERVER_HOST=${SERVER_HOST:-lab.baileys.app}
      - SITES_DIR=/app/sites
      - DATABASE_PATH=/app/data/staticer.db

      # Secrets (MUST set via .env file!)
      - UPLOAD_SECRET=${UPLOAD_SECRET}
      - ADMIN_SECRET=${ADMIN_SECRET}

      # Limits
      - MAX_UPLOAD_SIZE=${MAX_UPLOAD_SIZE:-104857600}
      - MAX_EXTRACTED_SIZE=${MAX_EXTRACTED_SIZE:-524288000}
      - MAX_FILES_PER_SITE=${MAX_FILES_PER_SITE:-1000}
      - RATE_LIMIT_UPLOADS=${RATE_LIMIT_UPLOADS:-10}
    volumes:
      # Named volumes for production
      - staticer-data:/app/data
      - staticer-sites:/app/sites
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
    networks:
      - staticer-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Optional: Nginx reverse proxy for production
  nginx:
    image: nginx:alpine
    container_name: staticer-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
      - nginx-cache:/var/cache/nginx
    depends_on:
      - staticer
    networks:
      - staticer-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  staticer-data:
    driver: local
  staticer-sites:
    driver: local
  nginx-cache:
    driver: local

networks:
  staticer-network:
    driver: bridge
