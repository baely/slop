# Minimal Traefik + Staticer setup
# Use this if you already have Traefik running

services:
  staticer:
    image: registry.baileys.dev/staticer:latest
    container_name: staticer
    restart: unless-stopped
    environment:
      # Required
      - SERVER_PORT=8080
      - SERVER_HOST=${DOMAIN:-lab.baileys.app}
      - UPLOAD_SECRET=${UPLOAD_SECRET:-changeme}
      - ADMIN_SECRET=${ADMIN_SECRET:-changeme}

      # Paths (defaults work but explicit is better)
      - SITES_DIR=/app/sites
      - DATABASE_PATH=/app/data/staticer.db

      # Limits (optional, have defaults)
      - MAX_UPLOAD_SIZE=${MAX_UPLOAD_SIZE:-104857600}
      - MAX_EXTRACTED_SIZE=${MAX_EXTRACTED_SIZE:-524288000}
      - MAX_FILES_PER_SITE=${MAX_FILES_PER_SITE:-1000}
      - RATE_LIMIT_UPLOADS=${RATE_LIMIT_UPLOADS:-10}
    volumes:
      - staticer-data:/app/data
      - staticer-sites:/app/sites
    labels:
      - "traefik.enable=true"

      # Main domain
      - "traefik.http.routers.staticer.rule=Host(`${DOMAIN:-lab.baileys.app}`) || HostRegexp(`^.+\\.${DOMAIN:-lab.baileys.app}`)"
      - "traefik.http.routers.staticer.entrypoints=websecure"
      - "traefik.http.routers.staticer.tls.certresolver=letsencrypt"
      - "traefik.http.services.staticer.loadbalancer.server.port=8080"

      # Security headers
      - "traefik.http.middlewares.staticer-headers.headers.framedeny=true"
      - "traefik.http.middlewares.staticer-headers.headers.sslredirect=true"
      - "traefik.http.middlewares.staticer-headers.headers.stsincludesubdomains=true"
      - "traefik.http.middlewares.staticer-headers.headers.stsseconds=31536000"
      - "traefik.http.routers.staticer.middlewares=staticer-headers"
    networks:
      - traefik
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8080/ || exit 1"]
      interval: 30s
      timeout: 3s
      start_period: 10s
      retries: 3

volumes:
  staticer-data:
    external: true
  staticer-sites:
    external: true

networks:
  traefik:
    external: true
