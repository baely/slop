services:
  staticer:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    deploy:
      replicas: 10
    ports:
      - "8080"
    environment:
      # Server configuration
      - SERVER_PORT=8080
      - SERVER_HOST=localhost
      - SITES_DIR=/app/sites
      - DATABASE_PATH=/app/data/staticer.db

      # Secrets (override in production!)
      - UPLOAD_SECRET=test-secret-123
      - ADMIN_SECRET=admin-secret-456

      # Limits
      - MAX_UPLOAD_SIZE=104857600        # 100MB
      - MAX_EXTRACTED_SIZE=524288000     # 500MB
      - MAX_FILES_PER_SITE=1000
      - RATE_LIMIT_UPLOADS=10
    volumes:
      # Persistent data
      - staticer-data:/app/data
      - staticer-sites:/app/sites
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
    networks:
      - staticer-network

volumes:
  staticer-data:
    driver: local
  staticer-sites:
    driver: local

networks:
  staticer-network:
    driver: bridge
