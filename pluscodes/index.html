<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Plus Codes</title>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="description" content="A visualisation of the Open Location Code (Plus Codes) grid system.">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="">
<link rel="stylesheet" href="style.css">
</head>
<body>
<div id="map"></div>

<div id="readout" aria-hidden="true">
  <div class="readout-row">
    <span class="readout-label">code</span>
    <span class="readout-value" id="r-code">—</span>
  </div>
  <div class="readout-row">
    <span class="readout-label">lat,lng</span>
    <span class="readout-value" id="r-coords">—</span>
  </div>
  <div class="readout-row">
    <span class="readout-label">cell</span>
    <span class="readout-value" id="r-cell">—</span>
  </div>
</div>

<div id="legend" aria-hidden="true">
  <div class="legend-title">Open Location Code</div>
  <ol class="legend-list" id="legend-list"></ol>
  <div class="legend-hint">click a cell to copy</div>
</div>

<div id="toast" role="status" aria-live="polite"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
<script src="main.js"></script>
</body>
</html>
