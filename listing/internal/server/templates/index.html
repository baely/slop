<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Services</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: #fff;
            color: #111;
            font-size: 13px;
            line-height: 1.5;
            padding: 24px 16px;
        }

        .container {
            max-width: 640px;
            margin: 0 auto;
        }

        .page-header {
            padding-bottom: 24px;
            margin-bottom: 24px;
            border-bottom: 1px solid #e0e0e0;
        }

        h1 {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .subtitle {
            font-size: 12px;
            color: #999;
        }

        .list {
            display: flex;
            flex-direction: column;
        }

        .item {
            padding: 14px 0;
            border-bottom: 1px solid #e0e0e0;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .item:last-child {
            border-bottom: none;
        }

        .item-title {
            font-size: 13px;
            font-weight: 600;
            color: #111;
        }

        .item-description {
            color: #666;
            font-size: 12px;
        }

        .item-link {
            display: inline-block;
            color: #111;
            text-decoration: none;
            font-size: 11px;
            font-family: 'Courier New', monospace;
            color: #999;
            word-break: break-all;
        }

        .item-link:hover {
            color: #111;
        }

        .empty {
            text-align: center;
            padding: 40px 0;
            color: #bbb;
            font-size: 13px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="page-header">
            <h1>Services</h1>
            <p class="subtitle">Running containers</p>
        </div>
        {{if .Containers}}
        <div class="list">
            {{range .Containers}}
            <div class="item">
                <span class="item-title">{{if .Title}}{{.Title}}{{else}}{{.Name}}{{end}}</span>
                {{if .Description}}
                <span class="item-description">{{.Description}}</span>
                {{end}}
                <a href="{{.URL}}" class="item-link" target="_blank" rel="noopener">{{.URL}}</a>
            </div>
            {{end}}
        </div>
        {{else}}
        <div class="empty">
            <p>No services available</p>
        </div>
        {{end}}
    </div>
</body>
</html>
