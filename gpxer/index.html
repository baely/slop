<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GPXer — Route Builder</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  :root {
    --bg: #0f1114;
    --surface: #181b20;
    --surface-2: #1e2228;
    --border: #2a2f38;
    --border-light: #363d49;
    --text: #d4d8e0;
    --text-dim: #7a8294;
    --text-muted: #4a5060;
    --accent: #e8c46a;
    --accent-dim: #b8943a;
    --waypoint: #6ae8a0;
    --track: #6ab8e8;
    --danger: #e86a6a;
    --radius: 6px;
    --font-mono: 'DM Mono', monospace;
    --font-serif: 'Instrument Serif', serif;
  }

  html, body { height: 100%; overflow: hidden; }

  body {
    font-family: var(--font-mono);
    font-weight: 300;
    background: var(--bg);
    color: var(--text);
    display: flex;
  }

  /* ─── Sidebar ─── */
  .sidebar {
    width: 340px;
    min-width: 340px;
    height: 100vh;
    display: flex;
    flex-direction: column;
    background: var(--surface);
    border-right: 1px solid var(--border);
    z-index: 1000;
    overflow: hidden;
  }

  .sidebar-header {
    padding: 20px 20px 16px;
    border-bottom: 1px solid var(--border);
  }

  .logo {
    font-family: var(--font-serif);
    font-size: 28px;
    color: var(--accent);
    letter-spacing: -0.5px;
    line-height: 1;
    margin-bottom: 2px;
  }
  .logo i { color: var(--text-dim); }

  .tagline {
    font-size: 10px;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 2px;
    margin-top: 4px;
  }

  /* ─── File name input ─── */
  .file-section {
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
  }

  .field-label {
    font-size: 9px;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--text-muted);
    margin-bottom: 6px;
    display: block;
  }

  .file-input-wrap {
    display: flex;
    align-items: center;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    transition: border-color 0.2s;
  }
  .file-input-wrap:focus-within {
    border-color: var(--accent-dim);
  }

  .file-input-wrap input {
    flex: 1;
    background: none;
    border: none;
    padding: 10px 12px;
    color: var(--text);
    font-family: var(--font-mono);
    font-size: 13px;
    font-weight: 400;
    outline: none;
  }
  .file-input-wrap input::placeholder { color: var(--text-muted); }

  .file-ext {
    padding: 10px 12px 10px 0;
    color: var(--text-dim);
    font-size: 13px;
    user-select: none;
  }

  /* ─── Mode toggle ─── */
  .mode-section {
    padding: 12px 20px;
    border-bottom: 1px solid var(--border);
  }

  .mode-toggle {
    display: flex;
    background: var(--bg);
    border-radius: var(--radius);
    padding: 3px;
    gap: 3px;
  }

  .mode-btn {
    flex: 1;
    padding: 8px 10px;
    border: none;
    border-radius: 4px;
    background: none;
    color: var(--text-dim);
    font-family: var(--font-mono);
    font-size: 11px;
    font-weight: 400;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
  }

  .mode-btn .dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    transition: background 0.2s;
  }

  .mode-btn[data-mode="waypoint"] .dot { border: 1.5px solid var(--waypoint); }
  .mode-btn[data-mode="track"] .dot { border: 1.5px solid var(--track); }

  .mode-btn.active {
    background: var(--surface-2);
    color: var(--text);
  }
  .mode-btn[data-mode="waypoint"].active .dot { background: var(--waypoint); }
  .mode-btn[data-mode="track"].active .dot { background: var(--track); }

  /* ─── Panels ─── */
  .panels {
    flex: 1;
    overflow-y: auto;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
  }

  .panel {
    border-bottom: 1px solid var(--border);
  }

  .panel-header {
    padding: 12px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    cursor: pointer;
    user-select: none;
  }
  .panel-header:hover { background: var(--surface-2); }

  .panel-title {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--text-dim);
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .panel-count {
    background: var(--bg);
    padding: 1px 7px;
    border-radius: 10px;
    font-size: 10px;
    color: var(--text-muted);
  }

  .panel-chevron {
    color: var(--text-muted);
    font-size: 12px;
    transition: transform 0.2s;
  }
  .panel.collapsed .panel-chevron { transform: rotate(-90deg); }
  .panel.collapsed .panel-body { display: none; }

  .panel-body {
    padding: 0 20px 14px;
  }

  /* ─── Track name ─── */
  .track-name-input {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 8px 10px;
    color: var(--text);
    font-family: var(--font-mono);
    font-size: 12px;
    font-weight: 300;
    outline: none;
    margin-bottom: 10px;
    transition: border-color 0.2s;
  }
  .track-name-input:focus { border-color: var(--accent-dim); }
  .track-name-input::placeholder { color: var(--text-muted); }

  /* ─── Items ─── */
  .item-list { display: flex; flex-direction: column; gap: 6px; }

  .item {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 8px 10px;
    display: flex;
    gap: 8px;
    align-items: flex-start;
    position: relative;
    transition: border-color 0.15s;
    animation: itemIn 0.2s ease-out;
  }
  .item:hover { border-color: var(--border-light); }

  @keyframes itemIn {
    from { opacity: 0; transform: translateY(-4px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .item-index {
    font-size: 9px;
    color: var(--text-muted);
    min-width: 20px;
    padding-top: 3px;
    text-align: right;
    user-select: none;
  }

  .item-fields { flex: 1; display: flex; flex-direction: column; gap: 4px; }

  .item-field {
    background: none;
    border: none;
    border-bottom: 1px solid transparent;
    color: var(--text);
    font-family: var(--font-mono);
    font-size: 11px;
    font-weight: 300;
    padding: 2px 0;
    outline: none;
    transition: border-color 0.2s;
    width: 100%;
  }
  .item-field:focus { border-bottom-color: var(--border-light); }
  .item-field::placeholder { color: var(--text-muted); }

  .item-coords {
    font-size: 10px;
    color: var(--text-muted);
    font-variant-numeric: tabular-nums;
  }

  .item-actions {
    display: flex;
    gap: 4px;
    align-items: flex-start;
    padding-top: 2px;
  }

  .item-btn {
    width: 22px; height: 22px;
    border: none;
    background: none;
    color: var(--text-muted);
    cursor: pointer;
    border-radius: 4px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    transition: all 0.15s;
  }
  .item-btn:hover { background: var(--surface-2); color: var(--text-dim); }
  .item-btn.delete:hover { color: var(--danger); }
  .item-btn.drag { cursor: grab; font-size: 10px; }
  .item-btn.drag:active { cursor: grabbing; }

  .empty-msg {
    font-size: 11px;
    color: var(--text-muted);
    padding: 12px 0;
    text-align: center;
    font-style: italic;
    font-family: var(--font-serif);
    font-size: 13px;
  }

  /* ─── Export ─── */
  .sidebar-footer {
    padding: 16px 20px;
    border-top: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .export-btn {
    width: 100%;
    padding: 12px;
    background: var(--accent);
    color: var(--bg);
    border: none;
    border-radius: var(--radius);
    font-family: var(--font-mono);
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    transition: all 0.2s;
    position: relative;
    overflow: hidden;
  }
  .export-btn:hover { background: #f0d080; transform: translateY(-1px); }
  .export-btn:active { transform: translateY(0); }
  .export-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

  .clear-btn {
    width: 100%;
    padding: 8px;
    background: none;
    color: var(--text-muted);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    font-family: var(--font-mono);
    font-size: 10px;
    cursor: pointer;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    transition: all 0.2s;
  }
  .clear-btn:hover { border-color: var(--danger); color: var(--danger); }

  /* ─── Map ─── */
  .map-container {
    flex: 1;
    position: relative;
  }

  #map {
    width: 100%;
    height: 100%;
  }

  /* Leaflet dark overrides */
  .leaflet-container { background: #0f1114; }
  .leaflet-control-zoom a {
    background: var(--surface) !important;
    color: var(--text-dim) !important;
    border-color: var(--border) !important;
  }
  .leaflet-control-zoom a:hover {
    background: var(--surface-2) !important;
    color: var(--text) !important;
  }
  .leaflet-control-attribution {
    background: rgba(15,17,20,0.8) !important;
    color: var(--text-muted) !important;
    font-family: var(--font-mono) !important;
    font-size: 9px !important;
  }
  .leaflet-control-attribution a { color: var(--text-dim) !important; }

  /* Map crosshair cursor */
  .map-crosshair .leaflet-grab { cursor: crosshair !important; }
  .map-crosshair .leaflet-dragging .leaflet-grab { cursor: grabbing !important; }

  /* ─── Coord display on map ─── */
  .coord-display {
    position: absolute;
    bottom: 28px;
    left: 12px;
    z-index: 999;
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--text-dim);
    background: rgba(15,17,20,0.85);
    padding: 5px 10px;
    border-radius: var(--radius);
    border: 1px solid var(--border);
    font-variant-numeric: tabular-nums;
    pointer-events: none;
  }

  .mode-indicator {
    position: absolute;
    top: 12px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 999;
    font-family: var(--font-mono);
    font-size: 11px;
    padding: 6px 16px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: rgba(15,17,20,0.9);
    color: var(--text-dim);
    pointer-events: none;
    display: flex;
    align-items: center;
    gap: 8px;
    transition: all 0.3s;
  }
  .mode-indicator .ind-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
  }
  .mode-indicator.waypoint-mode .ind-dot { background: var(--waypoint); }
  .mode-indicator.track-mode .ind-dot { background: var(--track); }

  /* ─── Custom markers ─── */
  .waypoint-marker {
    width: 24px !important; height: 24px !important;
    margin-left: -12px !important; margin-top: -12px !important;
  }
  .waypoint-marker-inner {
    width: 24px; height: 24px;
    background: var(--waypoint);
    border: 2px solid #fff;
    border-radius: 50%;
    box-shadow: 0 2px 8px rgba(0,0,0,0.4);
    display: flex; align-items: center; justify-content: center;
    font-family: var(--font-mono);
    font-size: 9px; font-weight: 500;
    color: #0f1114;
  }

  .track-marker {
    width: 14px !important; height: 14px !important;
    margin-left: -7px !important; margin-top: -7px !important;
  }
  .track-marker-inner {
    width: 14px; height: 14px;
    background: var(--track);
    border: 2px solid #fff;
    border-radius: 50%;
    box-shadow: 0 2px 6px rgba(0,0,0,0.4);
  }

  /* ─── Toast ─── */
  .toast {
    position: fixed;
    bottom: 24px;
    right: 24px;
    z-index: 9999;
    background: var(--surface);
    border: 1px solid var(--accent-dim);
    color: var(--accent);
    padding: 12px 20px;
    border-radius: var(--radius);
    font-family: var(--font-mono);
    font-size: 12px;
    opacity: 0;
    transform: translateY(10px);
    transition: all 0.3s;
    pointer-events: none;
  }
  .toast.show { opacity: 1; transform: translateY(0); }

  /* ─── Scrollbar ─── */
  .panels::-webkit-scrollbar { width: 5px; }
  .panels::-webkit-scrollbar-track { background: transparent; }
  .panels::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
</style>
</head>
<body>

<div class="sidebar">
  <div class="sidebar-header">
    <div class="logo">GPXer<i>.</i></div>
    <div class="tagline">Route Builder & Exporter</div>
  </div>

  <div class="file-section">
    <label class="field-label">File Name</label>
    <div class="file-input-wrap">
      <input type="text" id="fileName" placeholder="my-route" spellcheck="false" />
      <span class="file-ext">.gpx</span>
    </div>
  </div>

  <div class="mode-section">
    <div class="mode-toggle">
      <button class="mode-btn active" data-mode="waypoint" onclick="setMode('waypoint')">
        <span class="dot"></span> Waypoint
      </button>
      <button class="mode-btn" data-mode="track" onclick="setMode('track')">
        <span class="dot"></span> Track Point
      </button>
    </div>
  </div>

  <div class="panels">
    <div class="panel" id="waypointPanel">
      <div class="panel-header" onclick="togglePanel('waypointPanel')">
        <div class="panel-title">
          Waypoints <span class="panel-count" id="wptCount">0</span>
        </div>
        <span class="panel-chevron">▾</span>
      </div>
      <div class="panel-body">
        <div class="item-list" id="waypointList">
          <div class="empty-msg">Click the map to place waypoints</div>
        </div>
      </div>
    </div>

    <div class="panel" id="trackPanel">
      <div class="panel-header" onclick="togglePanel('trackPanel')">
        <div class="panel-title">
          Track <span class="panel-count" id="trkCount">0</span>
        </div>
        <span class="panel-chevron">▾</span>
      </div>
      <div class="panel-body">
        <input type="text" class="track-name-input" id="trackName" placeholder="Track name..." spellcheck="false" />
        <div class="item-list" id="trackList">
          <div class="empty-msg">Click the map to add track points</div>
        </div>
      </div>
    </div>
  </div>

  <div class="sidebar-footer">
    <button class="export-btn" id="exportBtn" onclick="exportGPX()">Export GPX</button>
    <button class="clear-btn" onclick="clearAll()">Clear All</button>
  </div>
</div>

<div class="map-container">
  <div class="mode-indicator waypoint-mode" id="modeIndicator">
    <span class="ind-dot"></span>
    <span id="modeText">Placing waypoints</span>
  </div>
  <div id="map" class="map-crosshair"></div>
  <div class="coord-display" id="coordDisplay">—</div>
</div>

<div class="toast" id="toast"></div>

<script>
// ─── State ───
let mode = 'waypoint';
let waypoints = [];
let trackpoints = [];
let waypointMarkers = [];
let trackMarkers = [];
let trackLine = null;
let dragIndex = null;

// ─── Map setup ───
const map = L.map('map', {
  zoomControl: true,
  attributionControl: true
}).setView([22.32, 114.17], 15);

L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
  attribution: '© <a href="https://www.openstreetmap.org/copyright">OSM</a> © <a href="https://carto.com/">CARTO</a>',
  subdomains: 'abcd',
  maxZoom: 20
}).addTo(map);

// ─── Map events ───
map.on('mousemove', (e) => {
  document.getElementById('coordDisplay').textContent =
    `${e.latlng.lat.toFixed(7)}, ${e.latlng.lng.toFixed(7)}`;
});

map.on('click', (e) => {
  const { lat, lng } = e.latlng;
  if (mode === 'waypoint') {
    addWaypoint(lat, lng);
  } else {
    addTrackPoint(lat, lng);
  }
});

// ─── Mode ───
function setMode(m) {
  mode = m;
  document.querySelectorAll('.mode-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.mode === m);
  });
  const indicator = document.getElementById('modeIndicator');
  indicator.className = 'mode-indicator ' + (m === 'waypoint' ? 'waypoint-mode' : 'track-mode');
  document.getElementById('modeText').textContent =
    m === 'waypoint' ? 'Placing waypoints' : 'Placing track points';
}

// ─── Waypoints ───
function addWaypoint(lat, lng) {
  const wpt = { lat, lng, name: '', desc: '' };
  waypoints.push(wpt);

  const icon = L.divIcon({
    className: 'waypoint-marker',
    html: `<div class="waypoint-marker-inner">${waypoints.length}</div>`
  });
  const marker = L.marker([lat, lng], { icon, draggable: true }).addTo(map);
  marker.on('dragend', (e) => {
    const pos = e.target.getLatLng();
    const idx = waypointMarkers.indexOf(marker);
    waypoints[idx].lat = pos.lat;
    waypoints[idx].lng = pos.lng;
    renderWaypoints();
  });
  waypointMarkers.push(marker);
  renderWaypoints();
}

function removeWaypoint(idx) {
  waypoints.splice(idx, 1);
  map.removeLayer(waypointMarkers[idx]);
  waypointMarkers.splice(idx, 1);
  // Renumber markers
  waypointMarkers.forEach((m, i) => {
    m.setIcon(L.divIcon({
      className: 'waypoint-marker',
      html: `<div class="waypoint-marker-inner">${i + 1}</div>`
    }));
  });
  renderWaypoints();
}

function renderWaypoints() {
  document.getElementById('wptCount').textContent = waypoints.length;
  const list = document.getElementById('waypointList');

  if (waypoints.length === 0) {
    list.innerHTML = '<div class="empty-msg">Click the map to place waypoints</div>';
    return;
  }

  list.innerHTML = waypoints.map((w, i) => `
    <div class="item">
      <div class="item-index">${i + 1}</div>
      <div class="item-fields">
        <input class="item-field" placeholder="Name" value="${esc(w.name)}"
          oninput="waypoints[${i}].name = this.value" spellcheck="false" />
        <input class="item-field" placeholder="Description" value="${esc(w.desc)}"
          oninput="waypoints[${i}].desc = this.value" spellcheck="false" />
        <div class="item-coords">${w.lat.toFixed(7)}, ${w.lng.toFixed(7)}</div>
      </div>
      <div class="item-actions">
        <button class="item-btn delete" onclick="removeWaypoint(${i})" title="Delete">×</button>
      </div>
    </div>
  `).join('');
}

// ─── Track Points ───
function addTrackPoint(lat, lng) {
  trackpoints.push({ lat, lng });

  const icon = L.divIcon({
    className: 'track-marker',
    html: '<div class="track-marker-inner"></div>'
  });
  const marker = L.marker([lat, lng], { icon, draggable: true }).addTo(map);
  marker.on('dragend', (e) => {
    const pos = e.target.getLatLng();
    const idx = trackMarkers.indexOf(marker);
    trackpoints[idx].lat = pos.lat;
    trackpoints[idx].lng = pos.lng;
    updateTrackLine();
    renderTrackPoints();
  });
  trackMarkers.push(marker);
  updateTrackLine();
  renderTrackPoints();
}

function removeTrackPoint(idx) {
  trackpoints.splice(idx, 1);
  map.removeLayer(trackMarkers[idx]);
  trackMarkers.splice(idx, 1);
  updateTrackLine();
  renderTrackPoints();
}

function moveTrackPoint(from, to) {
  if (to < 0 || to >= trackpoints.length) return;
  const [tp] = trackpoints.splice(from, 1);
  trackpoints.splice(to, 0, tp);
  const [mk] = trackMarkers.splice(from, 1);
  trackMarkers.splice(to, 0, mk);
  updateTrackLine();
  renderTrackPoints();
}

function updateTrackLine() {
  if (trackLine) map.removeLayer(trackLine);
  if (trackpoints.length < 2) return;
  trackLine = L.polyline(
    trackpoints.map(tp => [tp.lat, tp.lng]),
    { color: '#6ab8e8', weight: 2.5, opacity: 0.7, dashArray: '6 4' }
  ).addTo(map);
}

function renderTrackPoints() {
  document.getElementById('trkCount').textContent = trackpoints.length;
  const list = document.getElementById('trackList');

  if (trackpoints.length === 0) {
    list.innerHTML = '<div class="empty-msg">Click the map to add track points</div>';
    return;
  }

  list.innerHTML = trackpoints.map((tp, i) => `
    <div class="item">
      <div class="item-index">TP${String(i + 1).padStart(3, '0')}</div>
      <div class="item-fields">
        <div class="item-coords">${tp.lat.toFixed(7)}, ${tp.lng.toFixed(7)}</div>
      </div>
      <div class="item-actions">
        <button class="item-btn drag" onclick="moveTrackPoint(${i}, ${i - 1})" title="Move up">↑</button>
        <button class="item-btn drag" onclick="moveTrackPoint(${i}, ${i + 1})" title="Move down">↓</button>
        <button class="item-btn delete" onclick="removeTrackPoint(${i})" title="Delete">×</button>
      </div>
    </div>
  `).join('');
}

// ─── Panel toggle ───
function togglePanel(id) {
  document.getElementById(id).classList.toggle('collapsed');
}

// ─── Export ───
function exportGPX() {
  if (waypoints.length === 0 && trackpoints.length === 0) {
    showToast('Add waypoints or track points first');
    return;
  }

  const fileName = (document.getElementById('fileName').value.trim() || 'route') + '.gpx';
  const trackName = document.getElementById('trackName').value.trim() || 'Track';
  const now = new Date().toISOString().replace(/\.\d+Z$/, 'Z');

  let xml = `<?xml version="1.0" encoding="UTF-8" standalone="no" ?>\n`;
  xml += `<gpx xmlns="http://www.topografix.com/GPX/1/1" xmlns:gpxx="http://www.garmin.com/xmlschemas/GpxExtensions/v3" xmlns:gpxtpx="http://www.garmin.com/xmlschemas/TrackPointExtension/v1" creator="mapstogpx.com" version="1.1" xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance" xsi:schemaLocation="http://www.topografix.com/GPX/1/1 http://www.topografix.com/GPX/1/1/gpx.xsd http://www.garmin.com/xmlschemas/GpxExtensions/v3 http://www.garmin.com/xmlschemas/GpxExtensionsv3.xsd http://www.garmin.com/xmlschemas/TrackPointExtension/v1 http://www.garmin.com/xmlschemas/TrackPointExtensionv1.xsd">\n`;
  xml += `  <metadata>\n`;
  xml += `    <link href="http://www.mapstogpx.com">\n`;
  xml += `      <text>Sverrir Sigmundarson</text>\n`;
  xml += `    </link>\n`;
  xml += `    <time>${now}</time>\n`;
  xml += `  </metadata>\n`;

  waypoints.forEach(w => {
    xml += `  <wpt lat="${w.lat}" lon="${w.lng}">\n`;
    xml += `    <name>${escXml(w.name || 'Waypoint')}</name>\n`;
    xml += `    <desc>${escXml(w.desc || '')}</desc>\n`;
    xml += `  </wpt>\n`;
  });

  if (trackpoints.length > 0) {
    xml += `<trk>\n`;
    xml += `  <name>${escXml(trackName)}</name>\n`;
    xml += `  <number>1</number>\n`;
    xml += `  <trkseg>\n`;
    trackpoints.forEach((tp, i) => {
      xml += `  <trkpt lat="${tp.lat}" lon="${tp.lng}">\n`;
      xml += `    <name>TP${String(i + 1).padStart(3, '0')}</name>\n`;
      xml += `  </trkpt>\n`;
    });
    xml += `  </trkseg>\n`;
    xml += `</trk>\n`;
  }

  xml += `</gpx>`;

  const blob = new Blob([xml], { type: 'application/gpx+xml' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = fileName;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);

  showToast(`Exported ${fileName}`);
}

// ─── Clear ───
function clearAll() {
  waypoints = [];
  trackpoints = [];
  waypointMarkers.forEach(m => map.removeLayer(m));
  trackMarkers.forEach(m => map.removeLayer(m));
  waypointMarkers = [];
  trackMarkers = [];
  if (trackLine) { map.removeLayer(trackLine); trackLine = null; }
  renderWaypoints();
  renderTrackPoints();
  showToast('Cleared all data');
}

// ─── Helpers ───
function esc(s) { return s.replace(/"/g, '&quot;').replace(/</g, '&lt;').replace(/>/g, '&gt;'); }
function escXml(s) { return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&apos;'); }

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}
</script>
