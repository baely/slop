services:
  marquee:
    image: registry.baileys.dev/marquee:latest
    container_name: marquee
    restart: unless-stopped
    environment:
      # --- TMDB (metadata + posters) ---
      TMDB_API_KEY: ${TMDB_API_KEY:-}      # v3 key  (use one or the other)
      TMDB_BEARER: ${TMDB_BEARER:-}        # v4 read token (what we're using)
      # --- Radarr (the download loop) ---
      # NOTE: the container must be able to reach this. The LAN IP works only if
      # the host is on that network; from another network use a routable URL.
      RADARR_URL: ${RADARR_URL:-}
      RADARR_API_KEY: ${RADARR_API_KEY:-}
      # Optional: auto-detected from Radarr if omitted
      RADARR_QUALITY_PROFILE_ID: ${RADARR_QUALITY_PROFILE_ID:-}
      RADARR_ROOT_FOLDER: ${RADARR_ROOT_FOLDER:-}
      # --- App ---
      OWNER: ${OWNER:-bailey}
      DB_PATH: /data/marquee.db
    volumes:
      - marquee-data:/data
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.marquee.rule=Host(`${MARQUEE_HOST:-marquee.home.baileys.app}`)"
      - "traefik.http.services.marquee.loadbalancer.server.port=8000"
      # SECURITY: Marquee has no login and can trigger Radarr downloads + exposes
      # your library. Put it behind the same auth as your other internal apps.
      # Uncomment + set to your forward-auth middleware name (e.g. authelia@docker):
      # - "traefik.http.routers.marquee.middlewares=${MARQUEE_AUTH:-}"
    networks:
      - traefik

networks:
  # The shared Traefik network (external — created by your Traefik stack).
  traefik:
    external: true

volumes:
  marquee-data:
